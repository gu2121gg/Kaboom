<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bomb Men - Pixel Battle</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
<style>
@font-face {
  font-family: 'BoldPixels';
  src: url('icones/64/BoldPixels.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a14 url('sprites/mapa.png') center / 720px 624px;
  background-blend-mode: soft-light;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'BoldPixels', 'Press Start 2P', 'Courier New', monospace;
  overflow: hidden;
}

canvas {
  display: block;
  border-radius: 8px;
  image-rendering: pixelated;
}

.game-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  transform-origin: center center;
}
.cwrap {
  position: relative;
  display: inline-block;
  overflow: hidden;
  border-radius: 10px;
  box-shadow:
    0 0 40px rgba(99,102,241,0.08),
    0 0 80px rgba(0,0,0,0.4),
    inset 0 0 1px rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  line-height: 0;
}

.pspr {
  position: absolute;
  pointer-events: none;
  width: 51px;
  height: 51px;
  image-rendering: pixelated;
  z-index: 1;
  display: none;
}

/* HUD */
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 720px;
  color: #fff;
  font-size: 12px;
  padding: 4px 6px;
  margin-bottom: 2px;
}

.hud > div {
  padding: 6px 14px;
  border-radius: 6px;
  background: rgba(15,15,25,0.85);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(8px);
}

.hud .p1-hud {
  color: #60a5fa;
  text-shadow: 0 0 12px rgba(96,165,250,0.3);
}


.hud .score {
  font-size: 14px;
}

.hud .round-info {
  color: #666;
  font-size: 12px;
  text-transform: uppercase;
}

.hud .powerup-icons {
  display: flex;
  gap: 3px;
  margin-left: 6px;
}

.hud .powerup-icons img {
  width: 14px;
  height: 14px;
  image-rendering: pixelated;
  opacity: 0.8;
}

/* Lobby */
#lobby {
  display: none;
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(30,20,60,0.85), rgba(5,5,15,0.9)), url('icones/64/bg.png');
  background-size: cover;
  background-position: center;
  background-blend-mode: overlay;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  z-index: 10;
}
#lobby.show { display: flex; }

#lobby .lobby-hud {
  position: absolute;
  top: 14px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#lobby .lobby-hud .res span {
  color: #888;
  font-size: 12px;
  margin-right: 16px;
}
#lobby .lobby-hud .res .val { color: #fff; }
#lobby .lobby-hud .res .val.coins { color: #fbbf24; }
#lobby .lobby-hud .res .val.gems { color: #a78bfa; }

#lobby .hero-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 10px;
}
#lobby .hero-area .hero-sprite {
  width: 120px;
  height: 120px;
  image-rendering: pixelated;
  animation: heroIdle 2s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(99,102,241,0.2));
}
@keyframes heroIdle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
#lobby .hero-area .hero-name {
  color: #60a5fa;
  font-size: 14px;
  text-shadow: 0 0 20px rgba(96,165,250,0.3);
}
#lobby .hero-area .hero-energy {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #888;
}
#lobby .hero-area .hero-energy .bar-bg {
  width: 160px;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
}
#lobby .hero-area .hero-energy .bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s, background 0.3s;
}

#lobby .btns {
  display: flex;
  gap: 14px;
  margin-top: 10px;
}
#lobby .btns button {
  font-family: 'BoldPixels', monospace;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(20,20,35,0.85);
  color: #aaa;
  letter-spacing: 1px;
}
#lobby .btns button:hover { background: rgba(40,40,70,0.9); border-color: rgba(255,255,255,0.15); }
#lobby .btns button.primary {
  background: rgba(34,197,94,0.15);
  border-color: rgba(34,197,94,0.3);
  color: #4ade80;
}
#lobby .btns button.primary:hover { background: rgba(34,197,94,0.25); }

/* Shop */
#shop {
  display: none;
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(20,15,40,0.95), rgba(5,5,15,0.95)), url('icones/64/bg.png');
  background-size: cover;
  background-position: center;
  background-blend-mode: overlay;
  flex-direction: column;
  align-items: center;
  border-radius: 10px;
  z-index: 15;
  padding: 20px;
  box-sizing: border-box;
}
#shop.show { display: flex; }

#shop .shop-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 0 10px 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 12px;
}
#shop .shop-title {
  font-size: 18px;
  color: #fbbf24;
  letter-spacing: 2px;
}
#shop .shop-balance {
  display: flex;
  align-items: center;
  gap: 4px;
}
#shop .shop-balance .val { font-size: 13px; }
#shop .shop-balance .val.coins { color: #fbbf24; }
#shop .shop-balance .val.gems { color: #a78bfa; }

#shop .shop-items {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 380px;
  max-height: 360px;
  overflow-y: auto;
  padding-right: 4px;
}
#shop .shop-items::-webkit-scrollbar { width: 4px; }
#shop .shop-items::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 2px; }
#shop .shop-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.shop-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 10px 12px;
  transition: background 0.2s;
}
.shop-item:hover { background: rgba(255,255,255,0.06); }
.shop-item .si-icon { width: 28px; height: 28px; image-rendering: pixelated; flex-shrink: 0; }
.shop-item .si-info { flex: 1; min-width: 0; overflow: hidden; }
.shop-item .si-name { font-size: 13px; color: #e0e0e0; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shop-item .si-desc { font-size: 10px; color: #666; margin-top: 2px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shop-item .si-progress { font-size: 10px; color: #888; margin-top: 2px; line-height: 1.4; }
.shop-item .si-progress span { color: #60a5fa; }
.shop-item .si-buy {
  font-family: 'BoldPixels', monospace;
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid rgba(34,197,94,0.25);
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(34,197,94,0.1);
  color: #4ade80;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.shop-item .si-buy:hover { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.4); }
.shop-item .si-buy:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  background: rgba(60,60,80,0.1);
  border-color: rgba(255,255,255,0.04);
  color: #555;
}
.shop-item .si-buy.si-maxed {
  border-color: rgba(251,191,36,0.15);
  background: rgba(251,191,36,0.05);
  color: #fbbf24;
  cursor: default;
}

#shop .shop-back {
  font-family: 'BoldPixels', monospace;
  font-size: 13px;
  padding: 8px 24px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(20,20,35,0.85);
  color: #888;
  margin-top: 14px;
  letter-spacing: 1px;
}
#shop .shop-back:hover { background: rgba(40,40,70,0.9); border-color: rgba(255,255,255,0.15); color: #ccc; }

/* Reward screen */
#reward {
  display: none;
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(20,40,20,0.95), rgba(5,15,5,0.95)), url('icones/64/bg.png');
  background-size: cover;
  background-position: center;
  background-blend-mode: overlay;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  z-index: 15;
  padding: 20px;
  box-sizing: border-box;
  gap: 24px;
}
#reward.show { display: flex; }

#reward .reward-header {
  font-size: 20px;
  color: #4ade80;
  letter-spacing: 3px;
  text-shadow: 0 0 30px rgba(74,222,128,0.3);
}

#reward .reward-stats {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 280px;
}
#reward .rstat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.04);
}
#reward .rlabel { font-size: 13px; color: #888; display: flex; align-items: center; gap: 6px; }
#reward .rval { font-size: 16px; color: #e0e0e0; }
#reward .rval.gold { color: #fbbf24; }
#reward .rval.purple { color: #a78bfa; }
#reward .rbonus { border-color: rgba(251,191,36,0.1); background: rgba(251,191,36,0.03); }

#reward .reward-btns {
  display: flex;
  gap: 14px;
  margin-top: 8px;
}
#reward .reward-btns button {
  font-family: 'BoldPixels', monospace;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(20,20,35,0.85);
  color: #aaa;
  letter-spacing: 1px;
}
#reward .reward-btns button:hover { background: rgba(40,40,70,0.9); border-color: rgba(255,255,255,0.15); }
#reward .reward-btns button.primary {
  background: rgba(34,197,94,0.15);
  border-color: rgba(34,197,94,0.3);
  color: #4ade80;
}
#reward .reward-btns button.primary:hover { background: rgba(34,197,94,0.25); }

/* Hero screen */
#heroes {
  display: none;
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(20,15,30,0.97), rgba(5,5,15,0.98));
  flex-direction: column;
  border-radius: 10px;
  z-index: 14;
  padding: 16px;
  box-sizing: border-box;
  gap: 10px;
}
#heroes.show { display: flex; }
#heroes .heroes-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#heroes .heroes-title {
  font-size: 16px;
  color: #a78bfa;
  letter-spacing: 2px;
}
#heroes .heroes-balance {
  display: flex;
  gap: 10px;
  font-size: 11px;
  color: #888;
}
#heroes .heroes-preview {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.05);
}
#heroes .heroes-preview img {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
}
#heroes .heroes-preview .hp-info { flex: 1; min-width: 0; overflow: hidden; }
#heroes .heroes-preview .hp-name { font-size: 13px; color: #e0e0e0; line-height: 1.5; }
#heroes .heroes-preview .hp-rarity { font-size: 10px; letter-spacing: 1px; line-height: 1.4; }
#heroes .heroes-preview .hp-stats {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 4px;
  font-size: 10px;
  color: #888;
}
#heroes .heroes-preview .hp-stats span { line-height: 1.4; }
#heroes .heroes-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex: 1;
  align-content: flex-start;
  overflow-y: auto;
  padding: 4px 0;
}
#heroes .hero-card {
  width: 90px;
  padding: 8px 4px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
#heroes .hero-card:hover { background: rgba(255,255,255,0.05); }
#heroes .hero-card.selected {
  border-color: #60a5fa;
  background: rgba(96,165,250,0.08);
  box-shadow: 0 0 12px rgba(96,165,250,0.15);
}
#heroes .hero-card img {
  width: 40px;
  height: 40px;
  image-rendering: pixelated;
}
#heroes .hero-card .hc-name { font-size: 10px; color: #ccc; margin-top: 2px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#heroes .hero-card .hc-rarity { font-size: 8px; letter-spacing: 1px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#heroes .hero-card .hc-stamina { margin-top: 4px; }
#heroes .hero-card .hc-stamina .bar-bg { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
#heroes .hero-card .hc-stamina .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
#heroes .heroes-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 6px;
}
#heroes .heroes-btns button {
  font-family: 'BoldPixels', monospace;
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  background: rgba(20,20,35,0.85);
  color: #aaa;
  transition: all 0.2s;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 6px;
}
#heroes .heroes-btns button:hover { background: rgba(40,40,70,0.9); border-color: rgba(255,255,255,0.15); }
#heroes .heroes-btns button:first-child {
  background: rgba(251,191,36,0.1);
  border-color: rgba(251,191,36,0.2);
  color: #fbbf24;
}
#heroes .heroes-btns button:first-child:hover { background: rgba(251,191,36,0.2); }

/* Gacha screen */
#gacha {
  display: none;
  position: absolute;
  inset: 0;
  border-radius: 10px;
  z-index: 18;
}
#gacha.show { display: block; }
#gacha .gacha-bg {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  gap: 20px;
}
#gacha .gacha-slot {
  position: relative;
  width: 300px;
  padding: 0 8px;
  box-sizing: border-box;
}
#gacha .gacha-window {
  width: 100%;
  height: 90px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  background: rgba(0,0,0,0.4);
  position: relative;
}
#gacha .gacha-strip {
  display: flex;
  height: 100%;
  will-change: transform;
}
#gacha .gacha-strip .gs-item {
  width: 100px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px;
  box-sizing: border-box;
  border-left: 3px solid transparent;
}
#gacha .gacha-strip .gs-item img {
  width: 40px;
  height: 40px;
  image-rendering: pixelated;
}
#gacha .gacha-strip .gs-item .gs-name {
  font-size: 8px;
  color: #aaa;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
  text-align: center;
}
#gacha .gacha-strip .gs-item.gs-common { border-left-color: #9ca3af; }
#gacha .gacha-strip .gs-item.gs-rare { border-left-color: #60a5fa; }
#gacha .gacha-strip .gs-item.gs-epic { border-left-color: #a78bfa; }
#gacha .gacha-strip .gs-item.gs-legendary { border-left-color: #fbbf24; }
#gacha .gacha-pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 12px solid #fbbf24;
  z-index: 2;
  filter: drop-shadow(0 0 6px rgba(251,191,36,0.6));
}
#gacha .gacha-result {
  text-align: center;
  animation: gachaFadeIn 0.4s ease-out forwards;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
@keyframes gachaFadeIn {
  0% { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}
#gacha .gacha-name { font-size: 18px; color: #e0e0e0; line-height: 1.4; }
#gacha .gacha-rarity { font-size: 12px; letter-spacing: 2px; line-height: 1.4; }
#gacha .gacha-stats { font-size: 11px; color: #888; display: flex; gap: 10px; justify-content: center; align-items: center; line-height: 1.4; }

/* Overlay */
#overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(5, 5, 15, 0.92);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 18px;
  border-radius: 10px;
  z-index: 20;
  cursor: pointer;
  backdrop-filter: blur(6px);
}

#overlay.show { display: flex; }

#overlay .menu-logo {
  width: 280px;
  image-rendering: pixelated;
  filter: drop-shadow(0 0 30px rgba(99,102,241,0.25));
  animation: logoPulse 2.5s ease-in-out infinite;
}

@keyframes logoPulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(99,102,241,0.25)); }
  50% { transform: scale(1.03); filter: drop-shadow(0 0 40px rgba(99,102,241,0.4)); }
}

#overlay h1 {
  color: #fff;
  font-size: 28px;
  text-shadow: 0 0 30px rgba(99,102,241,0.35);
}

#overlay p {
  color: #888;
  font-size: 12px;
  animation: blink 1.5s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

#overlay .winner-text {
  font-size: 24px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b, #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  animation: winnerGlow 1s ease-in-out infinite;
}

@keyframes winnerGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.4); }
}

/* Controls info */
#ctrl span { line-height: 1.8; }

kbd {
  background: rgba(20,20,30,0.8);
  padding: 2px 5px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.08);
  color: #777;
  font-size: 11px;
  font-family: 'BoldPixels', monospace;
}

/* Countdown overlay */
#countdown {
  display: none;
  position: absolute;
  inset: 0;
  justify-content: center;
  align-items: center;
  z-index: 15;
  pointer-events: none;
}

#countdown.show { display: flex; }

#countdown img {
  width: 120px;
  height: 120px;
  image-rendering: pixelated;
  animation: countPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  filter: drop-shadow(0 0 40px rgba(255,255,255,0.3));
}

#pingIndic {
  position: absolute;
  top: 6px;
  right: 6px;
  z-index: 20;
  font-size: 10px;
  color: #4ade80;
  background: rgba(0,0,0,0.5);
  padding: 2px 6px;
  border-radius: 4px;
  display: none;
  pointer-events: none;
}
#pingIndic.warn { color: #facc15; }

const HERO_AVATARS = {};

function getRarityWeight(rarity) {
  return RARITY_WEIGHTS[rarity] || 0;
}

function rollRarity() {
  const r = Math.random();
  let acc = 0;
  for (const [rarity, weight] of Object.entries(RARITY_WEIGHTS)) {
    acc += weight;
    if (r < acc) return rarity;
  }
  return 'common';
}

function rollHero() {
  const rarity = rollRarity();
  const pool = HERO_TEMPLATES.filter(h => h.rarity === rarity);
  return pool[Math.floor(Math.random() * pool.length)];
}

function getHeroTemplate(hero) {

function levelShardCost(level) { return level * 3; }

function addShards(templateId, count) {
  if (!STATE.shards) STATE.shards = {};
  STATE.shards[templateId] = (STATE.shards[templateId] || 0) + count;
  // Check level-up
  const hero = STATE.heroes.find(h => h.templateId === templateId);
  if (!hero) return;
  while (STATE.shards[templateId] >= levelShardCost(hero.level)) {
    STATE.shards[templateId] -= levelShardCost(hero.level);
    hero.level++;
    // Increase hero stats
    const tpl = getHeroTemplate(hero);
    if (tpl) {
      tpl.stats.bombRangeBonus = Math.min((tpl.stats.bombRangeBonus || 0) + 0.2, 5);
      tpl.stats.maxBombsBonus = Math.min((tpl.stats.maxBombsBonus || 0) + 0.2, 5);
      tpl.stats.speedBonus = Math.min((tpl.stats.speedBonus || 0) + 0.2, 5);
      tpl.stats.luckBonus = Math.min((tpl.stats.luckBonus || 0) + 0.02, 0.5);
    }
  }
}

// Draw sprite helper
function spr(name, cx, cy, scale) {
  const img = IMG[name];
  if (!img || !img.complete || !img.naturalWidth) return;
  const s = scale || TILE / Math.max(img.naturalWidth, img.naturalHeight);
  const w = img.naturalWidth * s;
  const h = img.naturalHeight * s;
  ctx.drawImage(img, cx - w / 2, cy - h / 2, w, h);
}

      document.getElementById('pvpMatch').style.display = 'none';
      STATE.pvpMode = true;
      map = msg.map;
      players = msg.players.map(p => ({
        id: p.side,

        maxBombs: p.m || 1, curBombs: p.m || 1, bombRange: p.b || 2,
        speedLevel: 0, alive: true,
        energy: 100, maxEnergy: 100, deadTimer: 0,
        bombPressed: false, moveTarget: null,
        spriteBase: p.heroId || 'lara',
        bombRangeBonus: 0, maxBombsBonus: 0, speedBonus: 0, luckBonus: 0

      document.getElementById('hudGems').style.display = 'none';
      document.getElementById('rd').style.display = 'none';
      document.getElementById('pvpStats').style.display = 'flex';
      STATE.phase = 'countdown';
      STATE.pvpCountdown = msg.countdown || 180;
      const countEl = document.getElementById('countdown');
      const countImg = document.getElementById('countImg');
      countImg.src = 'sprites/gui_countdown_3.png';
      countEl.classList.add('show');
    }
    if (msg.type === 'pvp_state') {
      if (msg.ph === 'countdown') {
        const step = Math.min(3, Math.max(1, 3 - Math.floor((msg.t || 0) / 60)));
        document.getElementById('countImg').src = 'sprites/gui_countdown_' + step + '.png';
      }
      if (msg.ph === 'play' && STATE.phase === 'countdown') {
        STATE.phase = 'play';
        document.getElementById('countdown').classList.remove('show');
      }
      if (STATE.phase === 'countdown' || STATE.phase === 'play') {
        for (const sp of msg.p) {
          const p = players.find(pl => pl.side === sp.s);
          if (p) {
            const wasMoving = Math.abs(p.targetX - p.x) > 1 || Math.abs(p.targetY - p.y) > 1;
            const nowMoving = Math.abs(sp.x - p.x) > 1 || Math.abs(sp.y - p.y) > 1;
            if (!wasMoving && nowMoving) p.moveFrames = 14;
            if (nowMoving) { if (p.moveFrames > 0) p.moveFrames--; } else p.moveFrames = 0;
            p.targetX = sp.x; p.targetY = sp.y;
            p.col = Math.floor(sp.x / 48); p.row = Math.floor(sp.y / 48);
            p.dir = sp.d; p.alive = sp.a;
            p.maxBombs = sp.m || p.maxBombs;
            p.bombRange = sp.b || p.bombRange;
            if (sp.sp !== undefined) p.speed = sp.sp;
            if (sp.dn) p.display = sp.dn;
          }
        }
        bombs = (msg.b || []).map(b => ({ col: b.c, row: b.r, timer: b.t, range: 2, owner: null }));
        flames = (msg.f || []).map(f => ({ col: f.c, row: f.r, timer: 5, type: 'c' }));
        items = (msg.i || []).map(it => ({ col: it.c, row: it.r, type: it.t, timer: it.ti }));
        if (msg.rm) { for (const cell of msg.rm) { if (map[cell.r] !== undefined) map[cell.r][cell.c] = 0; } }
      }
    }
    if (msg.type === 'pong') {
      STATE.ping = Date.now() - (msg.t || 0);
    }
    if (msg.type === 'pvp_result') {
      STATE.pvpMode = false;
      STATE.phase = 'lobby';
      players = [];
      bombs = [];
      flames = [];
      document.getElementById('pingIndic').style.display = 'none';
      document.getElementById('pvpStats').style.display = 'none';
      document.getElementById('hudCoins').style.display = '';
      document.getElementById('hudGems').style.display = '';
      document.getElementById('rd').style.display = '';
      document.getElementById('countdown').classList.remove('show');

      document.getElementById('pvpQueue').classList.remove('show');
      showLobby();
      alert(msg.message);
    }
  };
  ws.onclose = () => { setTimeout(connectWS, 2000); };
}

function genMap() {
  map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      // Border walls
      if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
        map[r][c] = 1;
      // Checkerboard pillars
      } else if (r % 2 === 0 && c % 2 === 0) {
        map[r][c] = 1;
      // Player spawn zones
      } else if ((r === 1 && c === 1) || (r === 1 && c === 2) || (r === 2 && c === 1)) {
        map[r][c] = 0;
      } else {
        map[r][c] = 0;
      }
    }
  }
  // Place breakable blocks randomly (40-60)
  const count = 40 + Math.floor(Math.random() * 21);
  let placed = 0;
  while (placed < count) {
    const r = 1 + Math.floor(Math.random() * (ROWS - 2));
    const c = 1 + Math.floor(Math.random() * (COLS - 2));
    if (map[r][c] === 0 && !(r <= 2 && c <= 2) && !(r >= ROWS - 3 && c >= COLS - 3)) {
      map[r][c] = 2;
      placed++;
    }
  }
}

function isWall(r, c) {
  return r < 0 || r >= ROWS || c < 0 || c >= COLS || map[r][c] === 1;
}

function isSolid(r, c) {
  return r < 0 || r >= ROWS || c < 0 || c >= COLS || map[r][c] === 1 || map[r][c] === 2;
}

// ===== PARTICLES =====
function spawnBlockParticles(col, row) {
  const cx = col * TILE + TILE / 2;
  const cy = row * TILE + TILE / 2;
  const colors = ['#8B6914', '#A0782C', '#6B5310', '#C4A35A', '#D4B56A'];
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: cx + (Math.random() - 0.5) * 20,
      y: cy + (Math.random() - 0.5) * 20,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 2 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      gravity: 0.15
    });
  }
}

function spawnExplosionParticles(cx, cy) {
  const colors = ['#FF4500', '#FF6B35', '#FFD700', '#FF8C00', '#FFA500'];
  for (let i = 0; i < 16; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      size: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      gravity: 0.08
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.96;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function renderParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function spawnDeathAnim(x, y) {
  deathAnims.push({
    x, y,
    frame: 0,
    timer: 0,
    frameSpeed: 3
  });
  spawnExplosionParticles(x, y);
}

function updateDeathAnims() {
  for (let i = deathAnims.length - 1; i >= 0; i--) {
    const d = deathAnims[i];
    d.timer++;
    if (d.timer >= d.frameSpeed) {
      d.timer = 0;
      d.frame++;
      if (d.frame >= 10) {
        deathAnims.splice(i, 1);
      }
    }
  }
}

function renderDeathAnims() {
  for (const d of deathAnims) {
    const frameName = 'animation_explosion' + (d.frame + 1);
    if (IMG[frameName]) {
      spr(frameName, d.x, d.y, TILE * 1.8 / 16);
    }
  }
}

// ===== TILE-BASED MOVEMENT =====
function movePlayer(p, dx, dy, bombKey) {
  if (!p.alive) return;

  const cx = Math.floor(p.x / TILE);
  const cy = Math.floor(p.y / TILE);
  const centerX = cx * TILE + TILE / 2;
  const centerY = cy * TILE + TILE / 2;
  const atX = Math.abs(p.x - centerX) < 1.5;
  const atY = Math.abs(p.y - centerY) < 1.5;

  // Resolve diagonal — only allow one direction
  if (dx !== 0 && dy !== 0) {
    if (p.dx !== 0) dy = 0;
    else dx = 0;
  }

  // If moving toward a target, keep going
  if (p.moveTarget) {
    const spd = p.speed;
    if (p.dx !== 0) {
      p.x += p.dx * spd;
      if (Math.abs(p.x - p.moveTarget.x) <= spd) {
        p.x = p.moveTarget.x;
        p.moveTarget = null;
        p.dx = 0;
      }
    }
    if (p.dy !== 0) {
      p.y += p.dy * spd;
      if (Math.abs(p.y - p.moveTarget.y) <= spd) {
        p.y = p.moveTarget.y;
        p.moveTarget = null;
        p.dy = 0;
      }
    }
    p.walkFrame += 0.2;
  }

  // Snap to center when not moving and at rest
  if (!p.moveTarget && dx === 0 && dy === 0) {
    p.x = centerX;
    p.y = centerY;
    p.dx = p.dy = 0;
  }

  // Can only start new movement when at tile center and no target
  if (!p.moveTarget && (dx !== 0 || dy !== 0)) {
    if (dx !== 0 && atY) { p.dx = dx; p.dy = 0; p.dir = dx > 0 ? 'right' : 'left'; }
    else if (dy !== 0 && atX) { p.dy = dy; p.dx = 0; p.dir = dy > 0 ? 'down' : 'up'; }

    if (p.dx !== 0 || p.dy !== 0) {
      const nx = cx + p.dx;
      const ny = cy + p.dy;
      const tx = nx * TILE + TILE / 2;
      const ty = ny * TILE + TILE / 2;

      // Check blocks
      let block = isSolid(ny, nx);
      if (!block) {
        for (const b of bombs) {
          if (b.row === ny && b.col === nx) { block = true; break; }
        }
      }
      if (!block) {
        for (const op of players) {
          if (op !== p && op.alive && Math.floor(op.x / TILE) === nx && Math.floor(op.y / TILE) === ny) {
            block = true; break;
          }
        }
      }

      if (block) {
        p.x = centerX;
        p.y = centerY;
        p.dx = p.dy = 0;
      } else {
        p.moveTarget = { x: tx, y: ty };
        const spd = p.speed;
        if (p.dx !== 0) {
          p.x += p.dx * spd;
          if (Math.abs(p.x - tx) <= spd) { p.x = tx; p.moveTarget = null; p.dx = 0; }
        }
        if (p.dy !== 0) {
          p.y += p.dy * spd;
          if (Math.abs(p.y - ty) <= spd) { p.y = ty; p.moveTarget = null; p.dy = 0; }
        }
        p.walkFrame += 0.2;
      }
    }
  }

  // Bomb placement
  if (bombKey && !p.bombPressed && p.curBombs > 0 && (p.maxEnergy === 0 || p.energy >= 2)) {
    const bc = Math.floor(p.x / TILE);
    const br = Math.floor(p.y / TILE);
    if (map[br] && map[br][bc] === 0) {
      let occ = false;
      for (const b of bombs) {
        if (b.col === bc && b.row === br) { occ = true; break; }
      }
      if (!occ) {
        bombs.push({ col: bc, row: br, timer: 120, range: p.bombRange, owner: p });
        p.curBombs--;
        if (p.energy > 0) p.energy -= 2;
      }
    }
    p.bombPressed = true;
  }
  if (!bombKey) p.bombPressed = false;

  p.col = Math.floor(p.x / TILE);
  p.row = Math.floor(p.y / TILE);
  p.x = Math.max(TILE / 2, Math.min(MAP_W - TILE / 2, p.x));
  p.y = Math.max(TILE / 2, Math.min(MAP_H - TILE / 2, p.y));
}

// ===== EXPLOSION =====
function detonate(bomb) {
  const cells = [{ c: bomb.col, r: bomb.row, type: 'c' }];
  const dirs = [[0, -1, 'up'], [0, 1, 'down'], [-1, 0, 'left'], [1, 0, 'right']];

  // Screen effects
  shake = 10;
  flashAlpha = 0.25;
  spawnExplosionParticles(bomb.col * TILE + TILE / 2, bomb.row * TILE + TILE / 2);

  for (const [dc, dr, type] of dirs) {
    for (let i = 1; i <= bomb.range; i++) {
      const nc = bomb.col + dc * i;
      const nr = bomb.row + dr * i;
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) break;
      if (map[nr][nc] === 1) break;

      const isLast = i === bomb.range;
      const isBlock = map[nr][nc] === 2;

      let ftype = type;
      if (dc === 0 && !isLast && !isBlock) ftype = 'v';
      else if (dr === 0 && !isLast && !isBlock) ftype = 'h';

      cells.push({ c: nc, r: nr, type: ftype });

      if (isBlock) {
        map[nr][nc] = 0;
        spawnBlockParticles(nc, nr);
        STATE.blocksBroken++;
        updateLobby();
        // Drop item
        if (Math.random() < 0.30) {
          const types = ['item_bomb', 'item_flame', 'item_speedup'];
          const t = types[Math.floor(Math.random() * 3)];
          items.push({ col: nc, row: nr, type: t, timer: 600 });
        }
        break;
      }
    }
  }

  // Create flame effects
  for (const cell of cells) {
    let dup = false;
    for (const f of flames) {
      if (f.col === cell.c && f.row === cell.r && f.timer > 5) { dup = true; break; }
    }
    if (!dup) {
      flames.push({ col: cell.c, row: cell.r, timer: 20, type: cell.type });
    }
  }

  // Kill players (P1 is immortal)
  for (const p of players) {
    if (!p.alive) continue;
    if (p.id === 0) continue; // P1 never dies
    const pc = Math.floor(p.x / TILE);
    const pr = Math.floor(p.y / TILE);
    for (const cell of cells) {
      if (pc === cell.c && pr === cell.r) {
        p.alive = false;
        p.deadTimer = 60;
        shake = 14;
        flashAlpha = 0.4;
        spawnDeathAnim(p.x, p.y);
        break;
      }
    }
  }

  // Chain reaction
  for (const cell of cells) {
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      if (b.col === cell.c && b.row === cell.r && b !== bomb) {
        b.timer = 0;
      }
    }
  }
}

// ===== POWER-UPS =====
function applyItem(p, type) {
  if (type === 'item_bomb') {
    p.maxBombs = Math.min(p.maxBombs + 1, 8);
    p.curBombs++;
  } else if (type === 'item_flame') {
    p.bombRange = Math.min(p.bombRange + 1, 8);
  } else if (type === 'item_speedup') {
    p.speedLevel = Math.min(p.speedLevel + 1, 5);
    p.speed = BASE_SPEED + p.speedLevel * SPEED_INCREMENT;
  }
}

let session = { user: null, token: null };

function sendAuth(type, email, password) {
  const status = document.getElementById('loginStatus');
  const loginBtn = document.getElementById('loginBtn');
  loginBtn.disabled = true;
  loginBtn.textContent = 'AGUARDE...';
  status.innerHTML = '';
  const send = () => ws.send(JSON.stringify({ type, email, password }));
  if (ws.readyState !== WebSocket.OPEN) {
    const orig = ws.onopen;
    ws.onopen = () => { if (orig) orig(); send(); };
    return;
  }
  send();
}

function handleAuthOk(msg) {
  session = { user: msg.user, token: msg.token };
  localStorage.setItem('bombmen_token', msg.token);
  updateAuthUI();
}

function handleAuthError(msg) {
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'ENTRAR';
  document.getElementById('loginStatus').innerHTML = '<div class="login-error">' + msg.message + '</div>';
}

function updateAuthUI() {
  const overlay = document.getElementById('loginOverlay');
  const gameWrap = document.getElementById('gameWrap');

  if (session.user) {
    overlay.style.display = 'none';

    info.style.display = 'block';
    addr.textContent = session.user.email;
  } else {
    overlay.style.display = 'flex';
    gameWrap.style.display = 'none';
    info.style.display = 'none';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'ENTRAR';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';

}

function startFarm() {
  document.getElementById('lobby').classList.remove('show');
  STATE.round = 1;
  STATE.wins = [0];

  // Auto-fill team up to 3 with available heroes
  if (!STATE.team) STATE.team = [];
  for (let i = 0; i < STATE.heroes.length && STATE.team.length < 3; i++) {
    if (!STATE.team.includes(i) && STATE.heroes[i].stamina >= 10) STATE.team.push(i);
  }
  const team = STATE.team.filter(i => i >= 0 && i < STATE.heroes.length);
  if (team.length === 0) { showLobby(); return; }

  // Deduct stamina and create players
  players = spawnTeam(team);
  if (players.length === 0) { showLobby(); return; }
  startRound();
}

function spawnTeam(team) {
  const result = [];
  const startPositions = [
    { col: 1, row: 1 }, { col: 13, row: 11 }, { col: 13, row: 1 }
  ];
  for (let pi = 0; pi < team.length; pi++) {
    const hi = team[pi];
    const h = STATE.heroes[hi];
    if (!h || h.stamina < 10) continue;
    h.stamina -= 10;
    const tpl = getHeroTemplate(h);
    if (!tpl) continue;
    const pos = startPositions[pi] || { col: 7, row: 6 };
    const p = createPlayer(0, pi === 0);
    p.col = pos.col;
    p.row = pos.row;
    p.x = pos.col * TILE + TILE / 2;
    p.y = pos.row * TILE + TILE / 2;
    p.spriteBase = tpl.id;
    p.bombRangeBonus = tpl.stats.bombRangeBonus;
    p.maxBombsBonus = tpl.stats.maxBombsBonus;
    p.speedBonus = tpl.stats.speedBonus;
    p.luckBonus = tpl.stats.luckBonus;
    p.energy = h.stamina > 50 ? 100 : 50;
    p.maxEnergy = 100;
    p.bombRange = Math.min(p.bombRange + p.bombRangeBonus, 10);
    p.maxBombs = Math.min(p.maxBombs + p.maxBombsBonus, 10);
    p.speed = BASE_SPEED + (p.speedLevel + p.speedBonus) * SPEED_INCREMENT;
    p.curBombs = p.maxBombs;
    p.alive = true;
    result.push(p);
  }
  return result;
}

      const shards = STATE.shards[tpl.id] || 0;
      const shardNeed = levelShardCost(h.level);
      html += '<div style="display:flex;align-items:center;gap:10px;width:100%;">';
      html += `<img src="${getHeroSprite(hasSprite(tpl.id) ? tpl.id : 'lara')}" style="width:40px;height:40px;image-rendering:pixelated;">`;
      html += '<div class="hp-info" style="flex:1;min-width:0;">';
      html += `<div class="hp-name">${tpl.name}</div>`;
      html += `<div class="hp-rarity" style="color:${RARITY_COLORS[tpl.rarity]}">${tpl.rarity.toUpperCase()}</div>`;
      html += '<div class="hp-stats">';
      const st = tpl.stats;
      if (st.bombRangeBonus) html += '<span>Alcance +'+st.bombRangeBonus+'</span>';
      if (st.maxBombsBonus) html += '<span>Bombas +'+st.maxBombsBonus+'</span>';
      if (st.speedBonus) html += '<span>Vel +'+st.speedBonus+'</span>';
      if (st.luckBonus) html += '<span>Sorte +'+Math.round(st.luckBonus*100)+'%</span>';
      html += '</div>';
      // Level + shards
      html += `<div class="hp-shard" style="font-size:9px;color:#666;margin-top:2px;">Nv ${h.level} · Fragmentos ${shards}/${shardNeed}</div>`;
      // Stamina bar
      const stmPct = (h.stamina / tpl.maxStamina) * 100;
      const stmColor = stmPct <= 20 ? '#f87171' : stmPct <= 50 ? '#fbbf24' : '#60a5fa';
      html += `<div style="display:flex;align-items:center;gap:4px;margin-top:2px;font-size:9px;color:#888;">
        <div class="bar-bg" style="flex:1;height:4px;"><div class="bar-fill" style="width:${stmPct}%;height:100%;background:${stmColor};border-radius:2px;"></div></div>
        <span>${h.stamina}/${tpl.maxStamina}</span>
      </div>`;
      html += '</div></div>';
    }
    html += '</div>';
    preview.innerHTML = html;
  }

  // Grid
  const grid = document.getElementById('heroGrid');
  grid.innerHTML = '';
  for (let i = 0; i < STATE.heroes.length; i++) {
    const h = STATE.heroes[i];
    const tpl = getHeroTemplate(h);
    const inTeam = STATE.team && STATE.team.includes(i);
    const card = document.createElement('div');
    card.className = 'hero-card' + (inTeam ? ' selected' : '');
    const stmPct = (h.stamina / tpl.maxStamina) * 100;
    const stmColor = stmPct <= 20 ? '#f87171' : stmPct <= 50 ? '#fbbf24' : '#60a5fa';
    card.innerHTML = `
      <img src="${getHeroSprite(hasSprite(tpl.id) ? tpl.id : 'lara')}">
      <div class="hc-name">${tpl.name}</div>
      <div class="hc-rarity" style="color:${RARITY_COLORS[tpl.rarity]}">${tpl.rarity.toUpperCase()}</div>
      <div class="hc-stamina"><div class="bar-bg"><div class="bar-fill" style="width:${stmPct}%;background:${stmColor};"></div></div></div>
    `;
    card.addEventListener('click', () => {
      if (h.stamina <= 0) return;
      if (!STATE.team) STATE.team = [];
      const idx = STATE.team.indexOf(i);
      if (idx >= 0) {
        STATE.team.splice(idx, 1);
      } else if (STATE.team.length < 3) {
        STATE.team.push(i);
      }
      renderHeroes();
    });
    grid.appendChild(card);
  }
}

document.getElementById('btnGacha').addEventListener('click', closeHeroes);

let gachaHero = null;
function doGachaPull(premium) {
  let tpl;
  // Premium: higher chance of rare+
  if (premium) {
    const r = Math.random();
    let rarity;
    if (r < 0.05) rarity = 'common';
    else if (r < 0.25) rarity = 'rare';
    else if (r < 0.55) rarity = 'epic';
    else rarity = 'legendary';
    const pool = HERO_TEMPLATES.filter(h => h.rarity === rarity);
    tpl = pool[Math.floor(Math.random() * pool.length)];
  } else {
    tpl = rollHero();
  }

  // Check if already owned
  const owned = STATE.heroes.find(h => h.templateId === tpl.id);
  if (owned) {
    // Duplicate: shards for leveling
    const shardCount = tpl.rarity === 'legendary' ? 3 : tpl.rarity === 'epic' ? 2 : 1;
    addShards(tpl.id, shardCount);
    showGachaResult(tpl, 'DUPLICADO! +'+shardCount+' FRAGMENTOS');
    renderHeroes();
    return;
  }

  // New hero
  STATE.heroes.push({ templateId: tpl.id, level: 1, stamina: tpl.maxStamina });
  gachaHero = STATE.heroes.length - 1;
  showGachaResult(tpl, 'NOVO HEROI!');
  renderHeroes();
}

function showGachaResult(tpl, subtitle) {
  document.getElementById('heroes').classList.remove('show');
  const gacha = document.getElementById('gacha');
  gacha.classList.add('show');
  document.getElementById('btnGachaOk').style.display = 'none';
  document.getElementById('gachaResult').style.display = 'none';

  const N = 25;
  const winIdx = 18;
  const strip = document.getElementById('gachaStrip');
  strip.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const h = i === winIdx ? tpl : SPRITED_HEROES[Math.floor(Math.random() * SPRITED_HEROES.length)];
    const el = document.createElement('div');
    el.className = 'gs-item gs-' + h.rarity;
    el.innerHTML = `<img src="${getHeroSprite(hasSprite(h.id) ? h.id : 'lara')}"><div class="gs-name">${h.name}</div>`;
    strip.appendChild(el);
  }

  const ITEM_W = 100, WIN_W = 300;
  const targetX = -(winIdx * ITEM_W) + (WIN_W - ITEM_W) / 2;

  strip.style.transform = 'translateX(0px)';

  const duration = 3500;
  const startT = performance.now();
  function spin(ts) {
    const p = Math.min((ts - startT) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 4);
    const x = targetX * eased;
    strip.style.transform = `translateX(${x}px)`;
    if (p < 1) {
      requestAnimationFrame(spin);
    } else {
      document.getElementById('gachaResult').style.display = 'block';
      document.getElementById('gachaName').textContent = tpl.name;
      const re = document.getElementById('gachaRarity');
      re.textContent = subtitle;
      re.style.color = RARITY_COLORS[tpl.rarity];
      const stats = tpl.stats;
      document.getElementById('gachaStats').innerHTML = `
        ${stats.bombRangeBonus ? '<span>Alcance +'+stats.bombRangeBonus+'</span>' : ''}
        ${stats.maxBombsBonus ? '<span>Bombas +'+stats.maxBombsBonus+'</span>' : ''}
        ${stats.speedBonus ? '<span>Vel +'+stats.speedBonus+'</span>' : ''}
        ${stats.luckBonus ? '<span>Sorte +'+Math.round(stats.luckBonus*100)+'%</span>' : ''}
      `;
      document.getElementById('btnGachaOk').style.display = 'block';
    }
  }
  requestAnimationFrame(spin);
}

  STATE.phase = 'countdown';

  countImg.src = 'sprites/gui_countdown_3.png';

  countImg.style.animation = '';

  const interval = setInterval(() => {

      STATE.phase = 'play';
    }

}

// ===== AI =====
// Flood-fill BFS: one BFS per frame from player outward, finds nearest block.
// No target storage, no path storage, no skip lists, no stuck detection.
let wanderDir = null;

function updateAI(p) {
  if (!p.alive) return { dx: 0, dy: 0, bomb: false };
  if (p.moveTarget) return { dx: 0, dy: 0, bomb: false };

  const col = Math.floor(p.x / TILE);
  const row = Math.floor(p.y / TILE);

  // --- EMERGENCY FLEE: bomb about to explode ---
  for (const b of bombs) {
    if (b.timer >= 50) continue;
    const dist = Math.abs(b.col - col) + Math.abs(b.row - row);
    if (dist > b.range) continue;
    // Move to safest adjacent tile
    let best = null, bestD = -1;
    for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nc = col + dx, nr = row + dy;
      if (!canMoveTo(nc, nr) || hasBombAt(nc, nr)) continue;
      const d = Math.abs(nc - b.col) + Math.abs(nr - b.row);
      if (d > bestD) { bestD = d; best = { dx, dy }; }
    }
    if (best) return { dx: best.dx, dy: best.dy, bomb: false };
    return { dx: 0, dy: 0, bomb: false };
  }

  // --- PLANT BOMB: adjacent to a breakable block? ---
  if (p.curBombs > 0 && (p.maxEnergy === 0 || p.energy >= 2) && !hasBombAt(col, row)) {
    for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nc = col + dx, nr = row + dy;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && map[nr][nc] === 2) {
        return { dx: 0, dy: 0, bomb: true };
      }
    }
  }

  // --- BFS FLOOD: find nearest block ---
  const visited = {};
  const queue = [{ c: col, r: row, path: [] }];
  const key = (c, r) => c + ',' + r;
  visited[key(col, row)] = true;
  let head = 0;
  while (head < queue.length) {
    const cur = queue[head++];
    if (cur.path.length >= 30) continue;
    for (const [dc, dr] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nc = cur.c + dc, nr = cur.r + dr;
      const k = key(nc, nr);
      if (visited[k]) continue;
      visited[k] = true;
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;

      // Breakable block found — path leads to tile adjacent to it
      if (map[nr][nc] === 2) {
        if (cur.path.length > 0) {
          const first = cur.path[0];
          if (canMoveTo(col + first.dx, row + first.dy) && !hasBombAt(col + first.dx, row + first.dy)) {
            return { dx: first.dx, dy: first.dy, bomb: false };
          }
        }
        return { dx: 0, dy: 0, bomb: false };
      }

      if (isSolid(nr, nc)) continue; // wall

      // Skip bombs
      let bombed = false;
      for (const b of bombs) { if (b.col === nc && b.row === nr) { bombed = true; break; } }
      if (bombed) continue;

      queue.push({ c: nc, r: nr, path: cur.path.concat([{ dx: dc, dy: dr }]) });
    }
  }

  // --- WANDER: no blocks reachable ---
  if (wanderDir && canMoveTo(col + wanderDir.dx, row + wanderDir.dy) && !hasBombAt(col + wanderDir.dx, row + wanderDir.dy)) {
    return { dx: wanderDir.dx, dy: wanderDir.dy, bomb: false };
  }
  wanderDir = null;
  for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    if (canMoveTo(col + dx, row + dy) && !hasBombAt(col + dx, row + dy)) {
      wanderDir = { dx, dy };
      return { dx, dy, bomb: false };
    }
  }
  return { dx: 0, dy: 0, bomb: false };
}

function canMoveTo(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  if (isSolid(row, col)) return false;
  return true;
}

function hasBombAt(col, row) {
  for (const b of bombs) { if (b.col === col && b.row === row) return true; }
  return false;
}

// ===== UPDATE =====
function update() {
  if (STATE.phase === 'lobby') {
    updateLobby();
    // Stamina regen: 1 per ~1.5s in lobby
    for (const h of STATE.heroes) {
      const tpl = getHeroTemplate(h);
      if (tpl && h.stamina < tpl.maxStamina) {
        h.stamina = Math.min(tpl.maxStamina, h.stamina + 0.02);
      }
    }
    return;
  }
  if (STATE.phase !== 'play') {
    if (STATE.phase === 'countdown') {
      updateParticles();
    }
    return;
  }

  // PvP mode: send input to server, don't simulate locally
  if (STATE.pvpMode) {
    if (STATE.phase === 'play' || STATE.phase === 'countdown') {
      // Ping every ~2s
      STATE.pingTick = (STATE.pingTick || 0) + 1;
      if (STATE.pingTick >= 120) {
        STATE.pingTick = 0;
        ws.send(JSON.stringify({ type: 'ping', t: Date.now() }));
      }
      // Update ping indicator
      const pi = document.getElementById('pingIndic');
      if (STATE.ping !== undefined) {
        pi.style.display = 'block';
        pi.textContent = STATE.ping + 'ms';
        pi.className = STATE.ping > 300 ? 'bad' : STATE.ping > 150 ? 'warn' : '';
      }
      // Update PvP stats HUD
      const mySide = STATE.pvpSide;
      const me = players.find(p => p.side === mySide);
      const opp = players.find(p => p.side !== mySide);
      if (me && opp) {
        document.getElementById('pvpStats').style.display = 'flex';
        document.getElementById('pvpStatMySpr').src = getHeroIdleSprite(me.spriteBase || 'lara');
        document.getElementById('pvpStatMyName').textContent = me.display || 'Voce';
        document.getElementById('pvpStatOppSpr').src = getHeroIdleSprite(opp.spriteBase || 'lara');
        document.getElementById('pvpStatOppName').textContent = opp.display || 'Inimigo';
        document.getElementById('pvpStatMyIcons').innerHTML =
          '<img src="sprites/icon_bomb.png" title="Bombas">x' + (me.maxBombs || 0) +
          ' <img src="sprites/icon_flame.png" title="Alcance">x' + (me.bombRange || 0) +
          ' <img src="sprites/icon_speedup.png" title="Velocidade">' + (me.speed || 2).toFixed(1);
        document.getElementById('pvpStatOppIcons').innerHTML =
          '<img src="sprites/icon_bomb.png" title="Bombas">x' + (opp.maxBombs || 0) +
          ' <img src="sprites/icon_flame.png" title="Alcance">x' + (opp.bombRange || 0) +
          ' <img src="sprites/icon_speedup.png" title="Velocidade">' + (opp.speed || 2).toFixed(1);
      }
      const keys = { up: !!KEYS['KeyW'], down: !!KEYS['KeyS'], left: !!KEYS['KeyA'], right: !!KEYS['KeyD'], bomb: !!KEYS['Space'] };
      ws.send(JSON.stringify({ type: 'pvp_input', ...keys }));
      // Interpolation + animation tracking
      for (const p of players) {
        if (p.targetX !== undefined) {
          // Detect target changes → keep animation for ~150ms
          if (p._prevTargetX !== p.targetX || p._prevTargetY !== p.targetY) {
            p._animating = 10;
          }
          p._prevTargetX = p.targetX;
          p._prevTargetY = p.targetY;
          if (p._animating > 0) p._animating--;
          // Lerp toward server position
          p.x += (p.targetX - p.x) * 0.8;
          p.y += (p.targetY - p.y) * 0.8;
          if (Math.abs(p.x - p.targetX) < 0.5) p.x = p.targetX;
          if (Math.abs(p.y - p.targetY) < 0.5) p.y = p.targetY;
        }
      }
    }
    updateParticles();
    updateDeathAnims();
    return;
  }

  // AI control for ALL players
  for (const p of players) {
    if (!p.alive) continue;
    const ai = updateAI(p);
    if (p.maxEnergy === 0 || p.energy >= 2) {
      movePlayer(p, ai.dx, ai.dy, ai.bomb);
    } else {
      movePlayer(p, 0, 0, false);
    }
  }

  // Bombs
  for (let i = bombs.length - 1; i >= 0; i--) {
    bombs[i].timer--;
    if (bombs[i].timer <= 0) {
      detonate(bombs[i]);
      bombs[i].owner.curBombs++;
      bombs.splice(i, 1);
    }
  }

  // Flames
  for (let i = flames.length - 1; i >= 0; i--) {
    flames[i].timer--;
    if (flames[i].timer <= 0) flames.splice(i, 1);
  }

  // Items
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.timer--;
    if (item.timer <= 0) { items.splice(i, 1); continue; }

    for (const pl of players) {
      if (!pl.alive) continue;
      const pc = Math.floor(pl.x / TILE);
      const pr = Math.floor(pl.y / TILE);
      if (pc === item.col && pr === item.row) {
        applyItem(pl, item.type);
        items.splice(i, 1);
        updateHUDIcons();
        break;
      }
    }
  }

  // Energy regen for P1
  if (players[0].energy > 0 && players[0].energy < players[0].maxEnergy) {
    players[0].energy += 0.008; // slow regen
    if (players[0].energy > players[0].maxEnergy) players[0].energy = players[0].maxEnergy;
  }

  // Particles & death anims
  updateParticles();
  updateDeathAnims();

  // Flash decay
  if (flashAlpha > 0) flashAlpha *= 0.88;
  if (flashAlpha < 0.01) flashAlpha = 0;

  // Check all blocks cleared
  if (STATE.phase === 'play' && bombs.length === 0 && flames.length === 0) {
    let hasBlocks = false;
    for (let r = 0; r < ROWS && !hasBlocks; r++) {
      for (let c = 0; c < COLS && !hasBlocks; c++) {
        if (map[r][c] === 2) hasBlocks = true;
      }
    }
    if (!hasBlocks && STATE.blocksBroken > 0) {
      STATE.phase = 'pause';
      const p1 = players[0];
      ws.send(JSON.stringify({
        type: 'round_clear',
        blocks: STATE.blocksBroken,
        bombRange: p1 ? p1.bombRange : 2,
        maxBombs: p1 ? p1.maxBombs : 1,
        speedLevel: p1 ? p1.speedLevel : 0,
        heroBombRange: p1 ? (p1.bombRangeBonus || 0) : 0,
        heroMaxBombs: p1 ? (p1.maxBombsBonus || 0) : 0,
        heroSpeed: p1 ? (p1.speedBonus || 0) : 0,
        heroLuck: p1 ? (p1.luckBonus || 0) : 0
      }));
    }
  }

  // Dead timers
  for (const p of players) {
    if (!p.alive && p.deadTimer > 0) p.deadTimer--;
  }

  // Shake decay
  if (shake > 0) shake *= 0.85;
  if (shake < 0.5) shake = 0;
}

// ===== RENDER =====
function render() {
  if (STATE.phase === 'lobby') {
    ctx.fillStyle = '#08080e';
    ctx.fillRect(0, 0, MAP_W, MAP_H);
    // Draw decorative grid dots
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    for (let r = 0; r < ROWS; r += 2) {
      for (let c = 0; c < COLS; c += 2) {
        ctx.fillRect(c * TILE + TILE/2 - 1, r * TILE + TILE/2 - 1, 2, 2);
      }
    }
    return;
  }
  if (!map.length || !players.length) return;

  ctx.save();

  // Camera shake
  if (shake > 0.5) {
    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;
    ctx.translate(sx, sy);
  }

  // Background map
  const mi = IMG.mapa;
  if (mi && mi.complete && mi.naturalWidth) {
    ctx.drawImage(mi, 0, 0, MAP_W, MAP_H);
  }

  // Shadow layer under walls & blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!map[r]) continue;
      if (map[r][c] === 1 || map[r][c] === 2) {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(c * TILE + TILE / 2 + 4, r * TILE + TILE / 2 + 6, TILE / 2 - 4, 8, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Walls & blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!map[r]) continue;
      if (map[r][c] === 1) {
        spr('tile_env2_wall', c * TILE + TILE / 2, r * TILE + TILE / 2 - 2);
      } else if (map[r][c] === 2) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(c * TILE + 3, r * TILE + 3, TILE - 2, TILE - 2);
        spr('tile_env2_block', c * TILE + TILE / 2, r * TILE + TILE / 2 - 1);
      }
    }
  }

  // Items with floating animation
  for (const it of items) {
    const floatY = Math.sin(Date.now() * 0.004 + it.col * 2) * 3;
    spr(it.type, it.col * TILE + TILE / 2, it.row * TILE + TILE / 2 + floatY, TILE / 50);

    // Glow under item
    ctx.fillStyle = 'rgba(255,220,100,0.08)';
    ctx.beginPath();
    ctx.ellipse(it.col * TILE + TILE / 2, it.row * TILE + TILE / 2 + 10, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Blinking when about to expire
    if (it.timer < 120 && Math.floor(it.timer / 4) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,200,0.15)';
      ctx.fillRect(it.col * TILE, it.row * TILE, TILE, TILE);
    }
  }

  // Bombs with enhanced glow
  for (const b of bombs) {
    const frame = Math.floor((120 - b.timer) / 12) % 3 + 1;
    const pulse = 1 + Math.sin(b.timer * 0.2) * 0.1;

    // Danger radius preview (subtle)
    if (b.timer < 60) {
      ctx.globalAlpha = 0.04 + (60 - b.timer) * 0.002;
      ctx.fillStyle = '#FF4444';
      // Show danger tiles
      const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
      for (const [dc, dr] of dirs) {
        for (let i = 1; i <= b.range; i++) {
          const nc = b.col + dc * i;
          const nr = b.row + dr * i;
          if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS || map[nr][nc] === 1) break;
          ctx.fillRect(nc * TILE + 4, nr * TILE + 4, TILE - 8, TILE - 8);
          if (map[nr][nc] === 2) break;
        }
      }
      ctx.globalAlpha = 1;
    }

    // Glow
    ctx.shadowColor = 'rgba(255,100,50,0.5)';
    ctx.shadowBlur = 18 * pulse;
    spr('bomb' + frame, b.col * TILE + TILE / 2, b.row * TILE + TILE / 2 - 1);
    ctx.shadowBlur = 0;

    // Alert flash (prestes a explodir)
    if (b.timer < 40) {
      const blinkSpeed = b.timer < 20 ? 2 : 3;
      const alpha = Math.floor(b.timer / blinkSpeed) % 2 === 0 ? 0.3 : 0;
      ctx.fillStyle = `rgba(255,60,60,${alpha})`;
      ctx.fillRect(b.col * TILE - 4, b.row * TILE - 4, TILE + 8, TILE + 8);

      if (b.timer < 15) {
        const a2 = Math.floor(b.timer / 2) % 2 === 0 ? 0.2 : 0;
        ctx.fillStyle = `rgba(255,200,50,${a2})`;
        ctx.fillRect(b.col * TILE - 8, b.row * TILE - 8, TILE + 16, TILE + 16);
      }
    }
  }

  // Flames with correct sprite selection
  for (const f of flames) {
    let base = 'flame1';
    if (f.type === 'c') base = 'flame1';
    else if (f.type === 'up') base = 'flame1_up';
    else if (f.type === 'down') base = 'flame1_down';
    else if (f.type === 'left') base = 'flame1_left';
    else if (f.type === 'right') base = 'flame1_right';
    else if (f.type === 'h') base = 'flame1_horizontal';
    else if (f.type === 'v') base = 'flame1_vertical';

    // Use flame2 for initial burst
    if (f.timer > 15) base = base.replace('flame1', 'flame2');

    // Scale flame slightly based on life
    const fScale = TILE / Math.max(IMG[base]?.naturalWidth || TILE, IMG[base]?.naturalHeight || TILE);
    const lifeScale = f.timer > 15 ? 1.1 : 1 + (f.timer / 20) * 0.1;
    ctx.globalAlpha = Math.min(1, f.timer / 5);
    spr(base, f.col * TILE + TILE / 2, f.row * TILE + TILE / 2, fScale * lifeScale);
    ctx.globalAlpha = 1;
  }

  // Death animations (explosion frames)
  renderDeathAnims();

  // Players
  for (let pi = 0; pi < players.length; pi++) {
    const p = players[pi];
    // Ensure sprite element exists
    while (SPRITES.length <= pi) {
      const img = document.createElement('img');
      img.className = 'pspr';
      document.querySelector('.cwrap').appendChild(img);
      SPRITES.push(img);
    }
    const el = SPRITES[pi];
    if (!p.alive) {
      if (p.deadTimer > 0 && deathAnims.length === 0) {
        spr('other_rip', p.x, p.y);
      }
      el.style.display = 'none';
      continue;
    }

    spr('other_shadow', p.x, p.y + 18, TILE / 50);

    let src;
    const sb = p.spriteBase || 'lara';
    const useSb = hasSprite(sb) ? sb : 'lara';
    const idle = (STATE.pvpMode ? (p._animating <= 0) : (!p.moveTarget && p.dx === 0 && p.dy === 0));
    if (idle) src = 'sprites/player/' + useSb + '-Idle.gif';
    else if (p.dir === 'down') src = 'sprites/player/' + useSb + '-baixo.gif';
    else if (p.dir === 'up') src = 'sprites/player/' + useSb + '-cima.gif';
    else src = 'sprites/player/' + useSb + '-lado.gif';

    if (!el.src.endsWith(src)) el.src = src;
    el.style.display = 'block';
    el.style.left = (p.x - 25.5) + 'px';
    el.style.top = (p.y - 33.5) + 'px';
    const facesLeft = SPRITE_LADO_FACES_LEFT.includes(useSb);
    el.style.transform = p.dir === 'right' ? (facesLeft ? 'scaleX(-1)' : '') : (facesLeft ? '' : 'scaleX(-1)');
    el.style.filter = '';

    // Energy bar above player
    const barW = 34, barH = 4;
    const barX = p.x - barW / 2;
    const barY = p.y - 40;
    const ePct = Math.max(0, p.energy / p.maxEnergy);
    const eColor = ePct <= 0.2 ? '#f87171' : ePct <= 0.5 ? '#fbbf24' : '#4ade80';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = eColor;
    ctx.fillRect(barX, barY, barW * ePct, barH);
  }

  // Particles on top
  renderParticles();

  // Screen flash effect
  if (flashAlpha > 0.01) {
    ctx.fillStyle = `rgba(255, 200, 100, ${flashAlpha})`;
    ctx.fillRect(0, 0, MAP_W, MAP_H);
  }

  ctx.restore();
}

// ===== GAME LOOP =====
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
